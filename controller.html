<!DOCTYPE html>
<html>
    <body>
        <h1>Game Controller</h1>
        <button onclick="toggleLight()">Toggle Light</button>

        <script>

            let socket = new WebSocket("ws://192.168.0.9:8080");

            socket.onopen = function () {
                console.log("Connected to server");

                // REGISTER THIS CLIENT AS A PHONE
                socket.send("register:phone");
            };

            socket.onmessage = function (e) {
                console.log("Message from server:", e.data);
            };

            socket.onerror = function (err) {
                console.log("Socket error:", err);
            };

            socket.onclose = function () {
                console.log("Disconnected");
            };

            function toggleLight() {
                socket.send("toggle_light");
            }

        </script>
    </body>
</html>

<!--- 
o Write "python -m http.server 8000" to start
o Write ctrl + c to turn off server
o Write http://192.168.0.9:8000/controller.html on phone to find --->
